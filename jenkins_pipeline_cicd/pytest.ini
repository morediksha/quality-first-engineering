[pytest]
# Pytest configuration for Playwright + Allure

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    smoke: Smoke tests for basic functionality
    regression: Regression tests for comprehensive coverage
    skip: Skip this test
    new_account: Tests for newly created accounts

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --capture=no

# Timeout for tests (in seconds)
timeout = 300
